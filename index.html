<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Topup</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="" alt="Demo Web">
        </div>

        <div class="search-box">
            <input class="search-input" type="text" placeholder="Search Game...">
            <img class="search-icon" src="search.png" alt="search">
        </div>

        <div class="header-option">
            <div class="language-selector">
                <select class="language-select" name="" id="">
                    <option value="1">English</option>
                    <option value="2">Bangla</option>
                    <option value="3">Hindi</option>
                </select>
            </div>

            <div class="currency-selector">
                <select class="currency-select" name="" id="">
                    <option value="1">USD</option>
                    <option value="2">BDT</option>
                    <option value="3">INR</option>
                </select>
            </div>
        </div>

        <div class="cart">
            <img src="" alt="cart">
        </div>

        <div class="auth-buttons">
            <a class="login-btn" href="#">Login</a>
            <a class="sinup-btn" href="#">Sign Up a</a>
        </div>
    </header>
</body>

</html>
